name: Cron - Appointment Reminders

on:
  schedule:
    - cron: "0 * * * *"  # Every hour at minute 0 (UTC)
  workflow_dispatch:       # Manual trigger for testing

concurrency:
  group: appointment-reminders-cron
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger appointment reminders endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron/appointment-reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          # Extract HTTP status code (last line)
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::Cron endpoint returned HTTP $http_code"
            exit 1
          fi
